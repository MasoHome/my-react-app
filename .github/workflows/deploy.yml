name: CI/CD Pipeline

on:
  push:
    branches:
      - master

jobs:
  deploy-dev:
    runs-on: ubuntu-latest
    environment: dev
    steps:
      - uses: actions/checkout@v3

      # 1. Deploy Backend to Dev
      - name: Deploy Backend to Dev
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.BACKEND_SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e
            mkdir -p /home/${{ secrets.SERVER_USER }}/my-react-app/aserver
            cd /home/${{ secrets.SERVER_USER }}/my-react-app/aserver
            
            # Setup identity for Git
            echo "${{ secrets.SSH_PRIVATE_KEY }}" > .deploy_key
            chmod 600 .deploy_key
            ssh-keyscan github.com >> ~/.ssh/known_hosts
            
            # Force Git to use the identity file
            export GIT_SSH_COMMAND="ssh -o UserKnownHostsFile=/dev/null -o StrictHostKeyChecking=no -i .deploy_key"
            
            if [ ! -d .git ]; then
              git init
              git remote add origin git@github.com:MasoHome/my-react-app.git
            fi
            git fetch origin
            git reset --hard origin/master
            rm .deploy_key

            # Setup Node/npm
            if ! command -v npm &> /dev/null; then
              echo "npm not found, installing..."
              curl -fsSL https://deb.nodesource.com/setup_20.x | sudo -E bash -
              sudo apt-get install -y nodejs
            fi
            
            # Ensure PM2 is installed globally
            if ! command -v pm2 &> /dev/null; then
              sudo npm install -g pm2
            fi
            
            source ~/.profile || true
            npm install
            echo "DB_URL=${{ secrets.DB_URL }}" > .env
            pm2 reload ecosystem.config.js --env dev || pm2 start ecosystem.config.js --env dev

      # 2. Deploy Frontend to Dev
      - name: Deploy Frontend to Dev
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.FRONTEND_SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e
            # Ensure Nginx is installed
            if ! command -v nginx &> /dev/null; then
              sudo apt-get update && sudo apt-get install -y nginx
              sudo systemctl start nginx && sudo systemctl enable nginx
            fi
            
            # Create Nginx config if it doesn't exist
            if [ ! -f /etc/nginx/sites-available/my-react-app ]; then
              echo "server { listen 80; server_name _; root /home/${{ secrets.SERVER_USER }}/my-react-app/aclient/dist; index index.html; location / { try_files \$uri \$uri/ /index.html; } }" | sudo tee /etc/nginx/sites-available/my-react-app
            fi
            
            # Enable the config and restart Nginx
            sudo ln -sf /etc/nginx/sites-available/my-react-app /etc/nginx/sites-enabled/
            sudo nginx -t && sudo systemctl reload nginx
            
            # Ensure deployment directory exists and deploy
            mkdir -p /home/${{ secrets.SERVER_USER }}/my-react-app/aclient
            cd /home/${{ secrets.SERVER_USER }}/my-react-app/aclient
            
            # Setup identity for Git
            echo "${{ secrets.SSH_PRIVATE_KEY }}" > .deploy_key
            chmod 600 .deploy_key
            ssh-keyscan github.com >> ~/.ssh/known_hosts
            
            # Force Git to use the identity file
            export GIT_SSH_COMMAND="ssh -o UserKnownHostsFile=/dev/null -o StrictHostKeyChecking=no -i .deploy_key"
            
            if [ ! -d .git ]; then
              git init
              git remote add origin git@github.com:MasoHome/my-react-app.git
            fi
            git fetch origin
            git reset --hard origin/master
            rm .deploy_key
            
            # Setup Node/npm
            if ! command -v npm &> /dev/null; then
              echo "npm not found, installing..."
              curl -fsSL https://deb.nodesource.com/setup_20.x | sudo -E bash -
              sudo apt-get install -y nodejs
            fi
            
            source ~/.profile || true
            npm install
            echo "VITE_API_URL=${{ secrets.VITE_API_URL }}" > .env
            ./node_modules/.bin/tsc -b
            ./node_modules/.bin/vite build

  deploy-prod:
    runs-on: ubuntu-latest
    needs: deploy-dev
    environment: prod
    steps:
      - uses: actions/checkout@v3

      # 1. Deploy Backend to Prod
      - name: Deploy Backend to Prod
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.BACKEND_SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e
            cd /home/${{ secrets.SERVER_USER }}/my-react-app/aserver
            
            # Setup identity for Git
            echo "${{ secrets.SSH_PRIVATE_KEY }}" > .deploy_key
            chmod 600 .deploy_key
            ssh-keyscan github.com >> ~/.ssh/known_hosts
            
            # Force Git to use the identity file
            export GIT_SSH_COMMAND="ssh -o UserKnownHostsFile=/dev/null -o StrictHostKeyChecking=no -i .deploy_key"
            
            if [ ! -d .git ]; then
              git init
              git remote add origin git@github.com:MasoHome/my-react-app.git
            fi
            git fetch origin
            git reset --hard origin/master
            rm .deploy_key
            
            # Setup Node/npm
            if ! command -v npm &> /dev/null; then
              echo "npm not found, installing..."
              curl -fsSL https://deb.nodesource.com/setup_20.x | sudo -E bash -
              sudo apt-get install -y nodejs
            fi
            
            # Ensure PM2 is installed globally
            if ! command -v pm2 &> /dev/null; then
              sudo npm install -g pm2
            fi
            
            source ~/.profile || true
            npm install
            echo "DB_URL=${{ secrets.DB_URL }}" > .env
            pm2 reload ecosystem.config.js --env prod || pm2 start ecosystem.config.js --env prod

      # 2. Deploy Frontend to Prod
      - name: Deploy Frontend to Prod
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.FRONTEND_SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e
            # Ensure Nginx is installed
