name: CI/CD Pipeline

on:
  push:
    branches:
      - dev
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: ${{ github.ref == 'refs/heads/master' && 'prod' || 'dev' }}
    steps:
      - uses: actions/checkout@v3

      # 1. Deploy to API Server
      - name: Deploy to API Server
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /home/${{ secrets.SERVER_USER }}/my-react-app/aserver
            git pull
            npm install 
            
            # Inject the database path securely from your environment secrets
            echo "DB_URL=${{ secrets.DB_URL }}" > .env      

            # Use the environment name to determine the PM2 config            
            # If the env is 'prod', use --env prod, otherwise use nothing or --env dev
            ENV_FLAG="${{ github.ref == 'refs/heads/master' && '--env prod' || '--env dev' }}"            
            pm2 reload ecosystem.config.js $ENV_FLAG


      # 2. Deploy to Client Server
      - name: Deploy to Client Server
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /home/${{ secrets.SERVER_USER }}/my-react-app/aclient
            npm install
            # Select the secret based on the branch
            # GitHub injects the environment-specific secret automatically
            VITE_API_URL=${{ secrets.VITE_API_URL }}
            npm run build
            pm2 reload react-client