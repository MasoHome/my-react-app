name: CI/CD Pipeline

on:
  push:
    branches:
      - dev
      - master

jobs:
  deploy-backend:
    runs-on: ubuntu-latest
    environment: ${{ github.ref == 'refs/heads/master' && 'prod' || 'dev' }}
    steps:
      - uses: actions/checkout@v3
      - name: Deploy API
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.BACKEND_SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e
            APP_DIR="/home/${{ secrets.SERVER_USER }}/my-react-app/aserver"
            mkdir -p $APP_DIR
            cd $APP_DIR
            
            # Setup repository if not already cloned
            if [ ! -d ".git" ]; then
              git clone ${{ secrets.REPO_URL }} .
            else
              git pull origin ${{ github.ref_name }}
            fi
            
            npm install
            
            # Write environment variables
            cat <<EOF > .env
            DB_URL=${{ secrets.DB_URL }}
            NODE_ENV=${{ github.ref == 'refs/heads/master' && 'production' || 'development' }}
            EOF
            
            ENV_FLAG="${{ github.ref == 'refs/heads/master' && '--env prod' || '--env dev' }}"
            pm2 reload ecosystem.config.js $ENV_FLAG || pm2 start ecosystem.config.js $ENV_FLAG

  deploy-frontend:
    runs-on: ubuntu-latest
    needs: deploy-backend
    environment: ${{ github.ref == 'refs/heads/master' && 'prod' || 'dev' }}
    steps:
      - uses: actions/checkout@v3
      - name: Deploy Frontend
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.FRONTEND_SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e
            APP_DIR="/home/${{ secrets.SERVER_USER }}/my-react-app/aclient"
            mkdir -p $APP_DIR
            cd $APP_DIR
            
            if [ ! -d ".git" ]; then
              git clone ${{ secrets.REPO_URL }} .
            else
              git pull origin ${{ github.ref_name }}
            fi
            
            npm install
            
            echo "VITE_API_URL=${{ secrets.VITE_API_URL }}" > .env
            npm run build